 the air and their bites carry a numbing chill.",lore:"Frostwolves were considered lucky omens in Ironpeak villages — their fur was offered to travellers. That was before the hunger drove them to hunt people.",drops:"Frost Pelt, Wolf Fang"},{id:"titan",name:"Frost Titan",zone:"Frostfang Cavern",icon:"frost",rarity:"boss",desc:"An ancient giant of ice and stone, the Frost Titan has slept in the deepest cavern for centuries. The Hollow King's power awakened it as a guardian of the Frost Relic.",lore:"The Titan predates the Kingdom of Verandah itself. Ancient records call it 'the Mountain's Heartbeat' — a being of pure elemental force. It does not think; it endures.",drops:"Frost Relic, Rime Plate, XP"},{id:"emberwolf",name:"Emberwolf",zone:"Emberveil Wastes",icon:"fire",rarity:"uncommon",desc:"Wolves that evolved in the volcanic wastelands, their fur singed away, their hide hardened by ash. They run across lava flows without harm.",lore:"Emberwolves are the Emberveil's apex predators. Merchants who cross the wastes pay handsomely for their ash-resistant hides — if anyone survives to bring them back.",drops:"Ember Pelt, Ash Fragment"},{id:"colossus",name:"Flame Colossus",zone:"Scorchdeep",icon:"fire",rarity:"boss",desc:"A living embodiment of the volcano's fury — stone and magma fused into a titanic warrior. Scorchdeep has been its prison for three hundred years.",lore:"The Flame Colossus was created by a mage-king who wanted to harness volcanic power. It destroyed its creator and has dwelled in Scorchdeep ever since, content in its forge-heat.",drops:"Flame Relic, Obsidian Plate, XP"},{id:"stormwisp",name:"Stormwisp",zone:"Tempest Reach",icon:"bolt",rarity:"uncommon",desc:"Crackling balls of living lightning. They drift on storm winds and discharge into anything that comes close. They are not malicious — just electrically unstable.",lore:"Stormwisps form in the eye of hurricanes. The Stormcaller learned to command them as an extension of its own storm-body.",drops:"St
