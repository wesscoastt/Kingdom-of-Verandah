<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Kingdom of Verandah</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0d1422; touch-action: none; }
    #root { width: 100%; height: 100%; }
    #loading {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(180deg, #0d1422, #1a2438 50%, #243a2e);
      color: #f0c659; font-family: Georgia, serif; z-index: 9999;
    }
    #loading h1 { font-size: 42px; letter-spacing: 3px; text-shadow: 0 4px 20px #0009; margin-bottom: 8px; }
    #loading p  { font-size: 13px; letter-spacing: 5px; color: #8a7040; text-transform: uppercase; margin-bottom: 32px; }
    #loading .bar-track { width: 220px; height: 6px; background: #2a2010; border-radius: 3px; overflow: hidden; }
    #loading .bar-fill  { height: 100%; width: 0%; background: linear-gradient(90deg, #8a6312, #f0c659); border-radius: 3px; transition: width .3s; }
  </style>
</head>
<body>
  <div id="loading">
    <div style="font-size:64px;margin-bottom:12px;filter:drop-shadow(0 6px 14px #0009)">⚜️</div>
    <h1>Kingdom of Verandah</h1>
    <p>Keeper of the Four Relics</p>
    <div class="bar-track"><div class="bar-fill" id="bar"></div></div>
    <p id="status" style="margin-top:12px;font-size:11px;color:#555;letter-spacing:2px">Loading…</p>
  </div>
  <div id="root"></div>

  <!-- Step 1: React + ReactDOM -->
  <script>
    const bar = document.getElementById('bar');
    const status = document.getElementById('status');
    function setProgress(pct, msg) { bar.style.width = pct + '%'; status.textContent = msg; }
    setProgress(5, 'Loading React…');
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"
          onload="setProgress(20,'Loading Three.js…')"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"
          onload="setProgress(50,'Loading Babel…')"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"
          onload="setProgress(70,'Compiling game…')"></script>

  <!-- Step 2: Load + transpile the game JSX -->
  <script>
    setProgress(75, 'Fetching game…');
    fetch('verandah.jsx')
      .then(r => { if(!r.ok) throw new Error('Failed to fetch verandah.jsx'); return r.text(); })
      .then(src => {
        setProgress(85, 'Compiling…');
        // Strip the export default — we'll grab the class by name after eval
        const patched = src
          .replace(/^export default /m, 'window.__VGame = ')
          .replace(/\bimport\s+\*\s+as\s+THREE\s+from\s+['"]three['"]/g, '// THREE loaded globally')
          .replace(/\bimport\s+\{\s*useState[\s\S]*?\}\s+from\s+['"]react['"]/g, '// React hooks from global')
          .replace(/\bimport\s+React[\s\S]*?from\s+['"]react['"]/g, '');

        const compiled = Babel.transform(patched, {
          presets: ['react'],
          plugins: [],
          filename: 'verandah.jsx',
        }).code;

        // Inject React hooks into scope
        const withHooks = `
          const { useState, useEffect, useRef, useCallback, useMemo } = React;
          ${compiled}
        `;

        setProgress(95, 'Starting…');
        // eslint-disable-next-line no-new-func
        new Function(withHooks)();

        const App = window.__VGame;
        if (!App) throw new Error('Game component not found');

        setProgress(100, 'Ready!');
        setTimeout(() => {
          document.getElementById('loading').style.display = 'none';
          ReactDOM.render(React.createElement(App), document.getElementById('root'));
        }, 200);
      })
      .catch(err => {
        status.textContent = 'Error: ' + err.message;
        bar.style.background = '#cc3322';
        console.error(err);
      });
  </script>
</body>
</html>
